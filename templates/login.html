<!-- admin_login.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

   <link rel="stylesheet"
href="{{ url_for('static', filename='login.css') }}">

</head>

<body>

    <div class="login-box">

        <h1>Admin Login</h1>

        <form action="/adminlogin" method="POST">

            <input type="text"
            name="username"
            placeholder="Enter Username"
            required>

            <input type="password"
            name="password"
            placeholder="Enter Password"
            required>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>

</html>
