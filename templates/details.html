<!DOCTYPE html>
<html>

<head>

    <title>Complaint List</title>

</head>

<body>

    <h1>Complaint List</h1>

    {% for complaint in complaints %}

    <div style="border:1px solid black;
    padding:10px;
    margin:10px;">

        <h3>ID : {{ complaint[0] }}</h3>

        <p><b>Name :</b> {{ complaint[1] }}</p>

        <p><b>Complaint :</b> {{ complaint[2] }}</p>

        <p><b>Status :</b> {{ complaint[3] }}</p>

    </div>

    {% endfor %}

</body>

</html>
